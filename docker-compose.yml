services:
  dashboard:
    build:
      context: .
    environment:
      NEXT_PUBLIC_DASHBOARD_NAME: ${NEXT_PUBLIC_DASHBOARD_NAME:-Daily Dashboard}
      ENTUR_CLIENT_NAME: ${ENTUR_CLIENT_NAME:-andre-status-page}
      ENTUR_STOP_PLACE_ID: ${ENTUR_STOP_PLACE_ID:-}
    ports:
      - "3000:3000"
    restart: unless-stopped
