services:
  dashboard:
    build:
      context: .
    environment:
      NEXT_PUBLIC_DASHBOARD_NAME: ${NEXT_PUBLIC_DASHBOARD_NAME:-Daily Dashboard}
      ENTUR_CLIENT_NAME: ${ENTUR_CLIENT_NAME:-andre-status-page}
      ENTUR_STOP_PLACE_ID: ${ENTUR_STOP_PLACE_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/google/callback}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_CALENDAR_IDS: ${GOOGLE_CALENDAR_IDS:-all}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
    ports:
      - "3000:3000"
    restart: unless-stopped
